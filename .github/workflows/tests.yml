name: tests

on:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run runtime preflight without runtime secrets
        run: python -m runtime.preflight --json --allow-missing-secrets

      - name: Check integration readiness
        run: python scripts/check_integration.py --allow-missing-upstream

name: integrate-prism-insight

on:
  workflow_dispatch:
    inputs:
      upstream_url:
        description: PRISM-INSIGHT upstream repository URL
        required: true
        default: https://github.com/dragon1086/prism-insight.git
      upstream_branch:
        description: PRISM-INSIGHT upstream branch
        required: true
        default: main
      target_branch:
        description: Branch to create/update with imported upstream
        required: true
        default: integrate-prism-insight

permissions:
  contents: write
  pull-requests: write

jobs:
  integrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create integration branch
        run: git checkout -B "${{ inputs.target_branch }}"

      - name: Import upstream under prism-insight
        env:
          UPSTREAM_URL: ${{ inputs.upstream_url }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
          BRANCH_NAME: ${{ inputs.target_branch }}
        run: bash scripts/integrate_prism_insight.sh

      - name: Patch PRISM-INSIGHT adapters
        run: python scripts/patch_prism_adapters.py

      - name: Commit adapter patch if needed
        run: |
          if [ -n "$(git status --short)" ]; then
            git add \
              prism-insight/trigger_batch.py \
              prism-insight/stock_tracking_agent.py \
              prism-insight/cores/agents/trading_agents.py
            git commit -m "feat: wire optimization adapters into prism-insight"
          else
            echo "No adapter patch changes to commit"
          fi

      - name: Verify patched integration
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pytest -q
          python scripts/check_integration.py
          python scripts/patch_prism_adapters.py --check
          python -m runtime.preflight --json

      - name: Push integration branch
        run: git push --force-with-lease origin "${{ inputs.target_branch }}"

      - name: Create or update draft PR
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          UPSTREAM_URL: ${{ inputs.upstream_url }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
        run: |
          body_file="/tmp/prism-integration-pr-body.md"
          cat > "$body_file" <<'EOF'
          ## Summary
          - Imports PRISM-INSIGHT upstream under `prism-insight/`.
          - Wires agents_invest profit scoring and risk-governor adapters into the imported agents.
          - Runs pytest, integration marker checks, adapter idempotency check, and runtime preflight.

          ## Required human checks before merge
          - Review AGPL-3.0 and upstream license obligations.
          - Confirm `prism-insight/trigger_batch.py`, `stock_tracking_agent.py`, and `cores/agents/trading_agents.py` patches match the intended agent behavior.
          - Keep operation in paper mode until paper validation and Telegram/Kill Switch checks pass.
          EOF

          existing_pr="$(gh pr list --head "$TARGET_BRANCH" --base main --state open --json number --jq '.[0].number // empty')"
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --title "Integrate PRISM-INSIGHT upstream with agents_invest adapters" \
              --body-file "$body_file"
            echo "pr_number=$existing_pr" >> "$GITHUB_ENV"
          else
            gh pr create \
              --draft \
              --base main \
              --head "$TARGET_BRANCH" \
              --title "Integrate PRISM-INSIGHT upstream with agents_invest adapters" \
              --body-file "$body_file"
          fi

      - name: Write workflow summary
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          {
            echo "## PRISM-INSIGHT integration complete"
            echo ""
            echo "Branch: \`$TARGET_BRANCH\`"
            echo ""
            echo "Checks run:"
            echo "- pytest"
            echo "- scripts/check_integration.py"
            echo "- scripts/patch_prism_adapters.py --check"
            echo "- python -m runtime.preflight --json"
            echo ""
            echo "Next: review the draft PR, keep paper mode, then validate Telegram alerts and RiskGovernor behavior before live trading."
          } >> "$GITHUB_STEP_SUMMARY"

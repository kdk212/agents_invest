name: manual-health-check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health:
    name: Repository health check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,aws]"

      - name: Run tests
        run: python -m pytest -q tests

      - name: Check runtime preflight without secrets
        run: python -m runtime.preflight --json --allow-missing-secrets

      - name: Check dashboard export
        run: python scripts/export_dashboard_status.py --output dashboard/status.json
